<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>On Delivery - Panel Operativo</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#d30000">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <style>
    :root { --primary-color: #d30000; --dark-color: #111111; --light-bg: #f8f9fa; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background-color: var(--light-bg); color: #333; }
    header { background-color: var(--dark-color); color: white; padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 4px solid var(--primary-color); }
    header img { height: 40px; border-radius: 50%; }
    .view { display: none; padding: 20px; max-width: 600px; margin: 0 auto; }
    .view.active { display: block; }
    .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; border-left: 4px solid var(--primary-color); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input, select, textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
    .btn { width: 100%; background-color: var(--primary-color); color: white; border: none; padding: 12px; font-size: 1rem; font-weight: bold; border-radius: 6px; cursor: pointer; margin-bottom: 10px; }
    .btn:hover { background-color: #b00000; }
    .btn-install { background-color: #111111; }
    .btn-whatsapp { background-color: #25D366; }
    #login-view { text-align: center; padding-top: 50px; }
    #login-view img { width: 130px; height: 130px; border-radius: 50%; margin-bottom: 20px; object-fit: cover; }
    .lista-pedidos { margin-top: 15px; background: #fff; border-radius: 6px; padding: 10px; border: 1px solid #eee; }
  </style>
</head>
<body>

  <header>
    <img src="https://i.postimg.cc/GhX8YJCV/Screenshot-20260611-123137-Instagram.jpg" alt="Logo">
    <h1>On Delivery</h1>
  </header>

  <div id="login-view" class="view active">
    <img src="https://i.postimg.cc/GhX8YJCV/Screenshot-20260611-123137-Instagram.jpg" alt="Logo">
    <h3>Iniciar Sesión</h3>
    <input type="email" id="email" placeholder="Correo electrónico">
    <input type="password" id="password" placeholder="Contraseña">
    <button class="btn" id="btn-ingresar">Ingresar</button>
  </div>

  <div id="aliado-view" class="view">
    <h2>Panel de Aliado Comercial</h2>
    <button class="btn" onclick="abrirFormularioPedido()">+ Solicitar Nuevo Delivery</button>
    
    <div id="form-solicitud" class="card" style="display: none;">
      <h3>Datos de Entrega</h3>
      <input type="text" id="p_nombre" placeholder="Nombre del Cliente">
      <input type="tel" id="p_tel" placeholder="Teléfono">
      <input type="text" id="p_sector" placeholder="Sector">
      <textarea id="p_ref" placeholder="Referencia"></textarea>
      <input type="url" id="p_maps" placeholder="Enlace GPS">
      <select id="p_zona"></select>
      <button class="btn" onclick="enviarPedido()">Confirmar Orden</button>
    </div>

    <div class="card">
      <h4>En Curso</h4>
      <div id="aliado-en-camino" class="lista-pedidos"></div>
    </div>
  </div>

  <div id="supervisor-view" class="view">
    <h2>Control de Tráfico</h2>
    <div class="card"><h3>Pendientes</h3><div id="sup-activos"></div></div>
    <div class="card"><h3>En Ruta</h3><div id="sup-camino"></div></div>
  </div>

  <div id="motorizado-view" class="view">
    <h2>Panel de Conductor</h2>
    <div class="card"><h3>Pedido Asignado</h3><div id="moto-asignado"></div></div>
  </div>

  <div id="admin-view" class="view">
    <h2>Panel Administrador Master</h2>
    
    <div class="card">
      <h3>Crear Nuevo Usuario</h3>
      <input type="text" id="admin_nuevo_nombre" placeholder="Nombre">
      <input type="email" id="admin_nuevo_correo" placeholder="Correo">
      <input type="text" id="admin_nuevo_pass" placeholder="Contraseña">
      <input type="tel" id="admin_nuevo_tel" placeholder="Teléfono">
      <select id="admin_nuevo_rol">
        <option value="aliado">Aliado Comercial</option>
        <option value="motorizado">Motorizado</option>
        <option value="supervisor">Supervisor</option>
      </select>
      <button class="btn" onclick="crearNuevoUsuario()">Registrar Usuario</button>
    </div>

    <div class="card">
      <h3>Crear Zona de Delivery</h3>
      <input type="text" id="admin_zona_nombre" placeholder="Nombre de Zona">
      <input type="number" id="admin_zona_precio" placeholder="Precio Base ($)">
      <button class="btn btn-whatsapp" onclick="crearZonaTabulador()">Guardar Zona</button>
    </div>
  </div>

  <audio id="audio-notif" src="./timbre.mp3" preload="auto"></audio>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
  <script type="module" src="./app.js"></script>
</body>
</html>
